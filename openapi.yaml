openapi: 3.0.3
info:
  title: Hotel Booking API
  version: 1.0.0
paths:
  /hotels/bookings:
    post:
      summary: Create a new hotel booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingId:
                    type: string
        '400':
          description: Bad Request - Missing or erroneous data

components:
  schemas:
    BookingRequest:
      type: object
      required: [hotelId, checkInDate, checkOutDate, guests]
      properties:
        hotelId: { type: string, example: "hilton001" }
        checkInDate: { type: string, format: date }
        checkOutDate: { type: string, format: date }
        guests:
          type: array
          items:
            $ref: '#/components/schemas/Guest'
    Guest:
      type: object
      required: [name, email, phone]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
